<!DOCTYPE html>
<html>

<head>
    <title>Mentorship System Login</title>
</head>

<body>

<h1>Mentorship System</h1>

<h2>Login</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">

    {% csrf_token %}

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>

</html>
